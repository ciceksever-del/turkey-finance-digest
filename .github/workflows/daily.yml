name: Daily Türkiye Finance Digest

on:
  schedule:
    # 05:00 UTC = 08:00 in Istanbul (Türkiye is UTC+3 all year). Runs every morning.
    - cron: "0 5 * * *"
  workflow_dispatch: {} # lets you run it manually from the Actions tab

permissions:
  contents: write # needed to commit the generated pages back to the repo

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT: ${{ secrets.DIGEST_RECIPIENT }}
        run: python main.py

      - name: Commit and push updated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Digest for $(date -u +%Y-%m-%d)"
            git push
          fi
